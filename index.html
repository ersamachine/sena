<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ea5455">
<title>SENA GÜMRÜK · ERSA Sevkiyat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root{
  --bg:#f8f7fa;--card:#ffffff;--card2:#f8f7fa;--red:#ea5455;--red-soft:rgba(234,84,85,.16);
  --gold:#ff9f43;--green:#28c76f;--cyan:#00cfe8;--blue:#3b82f6;--muted:#a5a3ae;--txt:#6f6b7d;--line:#ebe9f1;
  --ink:#5d596c;--head:#5d596c;--shadow:0 4px 18px rgba(75,70,92,.12);--shadow-sm:0 2px 5px rgba(75,70,92,.12);
  --grad:linear-gradient(118deg,#c81e35,#ea5455);--hero:linear-gradient(118deg,#bb1f33 8%,#e03a47 92%);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Public Sans',system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
i.ti{line-height:1;}
.wrap{max-width:1040px;margin:0 auto;padding:0 16px 90px;}
.mono{font-variant-numeric:tabular-nums;}
/* login */
.login{max-width:380px;margin:8vh auto;padding:34px 26px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);text-align:center;}
.login .lg{width:60px;height:60px;border-radius:16px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;margin:0 auto 16px;box-shadow:0 6px 14px rgba(234,84,85,.45);}
.login h1{font-size:21px;font-weight:800;color:var(--head);}
.login p{font-size:13px;color:var(--muted);margin:6px 0 18px;}
.rem{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin:12px 0 4px;}
.lerr{color:var(--red);font-size:13px;min-height:18px;margin-top:12px;font-weight:600;}
/* topbar */
.top{background:var(--card);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(34,41,47,.05);}
.top .in{max-width:1040px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:11px;}
.logo{width:40px;height:40px;border-radius:10px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 3px 8px rgba(234,84,85,.5);flex-shrink:0;}
.brand b{font-size:15px;font-weight:800;color:var(--head);display:block;line-height:1.1;letter-spacing:.4px;}
.brand span{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.8px;}
.top .r{margin-left:auto;display:flex;align-items:center;gap:6px;}
.ib{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--txt);cursor:pointer;background:none;border:none;font-size:19px;}
.ib:hover{background:#efeef1;}
.ci{width:36px;height:36px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
.lockchip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:50rem;background:rgba(168,170,174,.16);color:var(--txt);white-space:nowrap;}
/* hero */
.hero{background:var(--hero);border-radius:10px;box-shadow:0 6px 20px rgba(203,32,48,.35);padding:14px 16px 12px;margin:14px 0 14px;color:#fff;}
.hero h2{font-size:19px;font-weight:700;}
.hero .sub{font-size:12.5px;color:rgba(255,255,255,.8);margin-top:3px;}
.hwrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.hstrip{display:flex;gap:0;margin-top:18px;align-items:stretch;flex-wrap:wrap;}
/* V23 · hero kart tasarımı (onaylı mokap: MOKAP-HERO) — kartlar grid'de, asla üst üste binmez */
.htop{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.hcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:10px;}
.hgc{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:11px 14px;min-width:0;}
.hgc .l{font-size:11px;letter-spacing:.5px;font-weight:800;color:rgba(255,255,255,.9);display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.hgc .ic{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.22);display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto;}
.hgc .v{font-size:clamp(17px,1.5vw,23px);font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:.2px;}
.hgc .s{font-size:11.5px;color:rgba(255,255,255,.82);margin-top:5px;font-weight:600;line-height:1.45;}
.hgc.kalan{background:rgba(30,150,90,.34);border-color:rgba(142,255,192,.55);}
.hgc.kalan .v{color:#a8ffce;}
.hgc.kalan .ic{background:rgba(142,255,192,.28);}
.hgc.eksi{background:rgba(120,20,20,.4);border-color:rgba(255,170,170,.6);}
.hgc.eksi .v{color:#ffd6d6;}
.hgc.kom{border:1.5px dashed rgba(255,255,255,.55);background:rgba(255,255,255,.06);}
.hgc.klik{cursor:pointer;transition:background .15s,transform .15s;}
.hgc.klik:hover{background:rgba(255,255,255,.24);transform:translateY(-2px);}
.hgc.kom.klik:hover{background:rgba(255,255,255,.15);}
.hgc.grafik{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 10px;}
.hbadge{display:inline-flex;align-items:center;gap:5px;background:#ffe4b5;color:#8a5300;font-size:10.5px;font-weight:800;border-radius:16px;padding:3px 9px;margin-top:7px;}
.hbadge.gri{background:rgba(255,255,255,.25);color:#fff;}
.heq{margin-top:10px;background:rgba(0,0,0,.16);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;font-weight:700;}
.heq .chip{background:rgba(255,255,255,.18);border-radius:8px;padding:4px 10px;font-variant-numeric:tabular-nums;white-space:nowrap;}
.heq .chip.g{background:rgba(40,199,111,.4);color:#c9ffdf;}
.heq .chip.r{background:rgba(255,120,120,.35);color:#ffe0e0;}
.heq .op{font-size:15px;font-weight:800;color:rgba(255,255,255,.9);}
.heq .ayrik{margin-left:auto;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.85);}
@media(max-width:560px){.heq .ayrik{margin-left:0;flex-basis:100%;}}
.stt{flex:1;min-width:170px;padding:2px 22px;border-left:1px solid rgba(255,255,255,.22);margin-bottom:8px;}
.stt:first-child{border-left:none;padding-left:0;}
.stt .l{font-size:11px;font-weight:700;letter-spacing:.6px;color:rgba(255,255,255,.75);text-transform:uppercase;white-space:nowrap;}
.stt .v{font-size:26px;font-weight:700;margin-top:6px;line-height:1.1;white-space:nowrap;}
.stt .s{font-size:11.5px;color:rgba(255,255,255,.75);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.stt.pos2 .v{color:#8effc0;}
.stt.pos2 .l{color:rgba(198,255,222,.85);}
.mini2{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#ffb45c;color:#4d2800;letter-spacing:.2px;white-space:nowrap;}
.hfrm{font-size:11.5px;color:rgba(255,255,255,.65);margin-top:16px;border-top:1px solid rgba(255,255,255,.18);padding-top:12px;}
.hfrm b{color:#fff;font-weight:700;}
@media(max-width:560px){.stt{min-width:44%;}.stt:nth-child(odd){border-left:none;padding-left:0;}}
/* chips */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:50rem;white-space:nowrap;}
.lbl-sec{background:rgba(168,170,174,.2);color:#6f6b7d;}
.lbl-ok{background:rgba(40,199,111,.2);color:#1eaa5e;}
.lbl-warn{background:rgba(255,159,67,.2);color:#f18728;}
.lbl-bad{background:rgba(234,84,85,.2);color:#e0303e;}
.lbl-info{background:rgba(0,207,232,.2);color:#00a9c0;}
.lbl-blue{background:rgba(59,130,246,.2);color:#2f6fd8;}
.grn{display:inline-block;background:rgba(40,199,111,.2);color:#1eaa5e;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;vertical-align:2px;}
.rdb{display:inline-block;background:rgba(234,84,85,.2);color:#e0303e;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;vertical-align:2px;}
/* kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.kpi{background:var(--card);border-radius:8px;box-shadow:var(--shadow);padding:14px 16px;transition:.18s;}
.kpi:hover{transform:translateY(-2px);}
.kico{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;font-size:22px;}
.kv{font-size:20px;font-weight:700;color:var(--head);}
.kl{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px;}
/* filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;align-items:center;}
.fpill{font-size:12px;font-weight:600;padding:7px 15px;border-radius:50rem;background:var(--card);color:var(--txt);box-shadow:var(--shadow-sm);cursor:pointer;border:none;}
.fpill.on{background:linear-gradient(72.47deg,#ea5455 22%,rgba(234,84,85,.7) 76%);color:#fff;box-shadow:0 3px 8px rgba(234,84,85,.55);}
.nbtn{margin-left:auto;font-size:12px;font-weight:700;padding:9px 15px;border-radius:6px;background:var(--green);color:#fff;box-shadow:0 3px 8px rgba(40,199,111,.45);display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;}
/* sections + cards */
.sec{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--head);margin:18px 2px 10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px;}
.card{background:var(--card);border-radius:8px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:11px;border-bottom:3px solid transparent;cursor:pointer;transition:.18s;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(75,70,92,.18);}
.bd-bad{border-bottom-color:#ea5455;}
.bd-warn{border-bottom-color:#ff9f43;}
.head{display:flex;align-items:flex-start;gap:11px;}
.ico{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
.tt{font-size:15px;font-weight:700;color:var(--head);line-height:1.35;word-break:break-word;}
.stx{font-size:12px;color:var(--muted);margin-top:1px;font-weight:500;}
.chain{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.chain b{font-size:11px;font-weight:600;color:var(--muted);}
.pillx{font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;background:rgba(234,84,85,.14);color:#d02e3f;}
.stats{display:grid;grid-template-columns:1fr 1.2fr 1.2fr;gap:8px;border-top:1px solid var(--line);padding-top:11px;}
.stat .l{font-size:11px;color:var(--muted);font-weight:500;}
.stat .v{font-size:15px;font-weight:700;color:var(--head);margin-top:2px;}
.pay{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:11px;}
.pside{flex:1;min-width:0;}
.plab{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--txt);}
.pchip{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.pv{font-size:14.5px;font-weight:700;color:var(--head);margin-top:4px;white-space:nowrap;}
.ps{font-size:11px;color:var(--muted);margin-top:1px;}
.vs{width:30px;height:30px;border-radius:50%;background:#f1f0f2;color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbar{display:flex;height:9px;border-radius:50rem;overflow:hidden;background:#f1f0f2;}
.sbar i{display:block;height:100%;}
.gr{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--muted);font-weight:500;gap:8px;}
.gr b{font-size:13.5px;font-weight:700;}
.track{position:relative;height:8px;border-radius:50rem;background:#f1f0f2;overflow:hidden;margin-top:5px;}
.fill{position:absolute;top:0;bottom:0;}
.warns{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;}
.warns .chip{font-size:11px;padding:4px 10px;border-radius:4px;}
.msums{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:0 0 10px;}
.msum{padding:12px 14px;border-radius:8px;}
.msum .l{font-size:11px;font-weight:700;letter-spacing:.3px;}
.msum .v{font-size:17px;font-weight:700;margin-top:3px;}
.msum .s{font-size:11px;margin-top:2px;opacity:.8;}
.legrow{display:flex;gap:12px;align-items:center;font-size:11.5px;color:var(--muted);font-weight:500;margin:0 2px 8px;flex-wrap:wrap;}
.legrow i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}
.tagS{font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;background:#ea5455;color:#fff;margin-left:6px;letter-spacing:.3px;}
.kpi.klik{cursor:pointer;}
.kpi .chev{color:var(--muted);font-size:17px;transition:.2s;}
.kpi.on{outline:2px solid rgba(234,84,85,.5);outline-offset:-2px;}
.kpi.on .chev{transform:rotate(180deg);color:#ea5455;}
.kpanel{margin:12px 0 4px;}
.kpanel .kph{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13.5px;font-weight:700;color:var(--head);}
.kpanel .kph .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:18px;}
/* detail */
.box{background:var(--card);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);}
.row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink);}
.row:last-child{border-bottom:none;}
.grow{flex:1;min-width:0;}.nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px;}
.back{font-size:13px;color:var(--red);font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
.btn{border:none;border-radius:8px;padding:8px 13px;font-weight:700;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s;}
.b-on{background:rgba(40,199,111,.14);color:#28c76f;}.b-on:hover{background:#28c76f;color:#fff;}
.b-cy{background:rgba(0,207,232,.14);color:#00a9c0;}.b-cy:hover{background:#00cfe8;color:#fff;}
.b-w{background:rgba(59,130,246,.14);color:#3b82f6;}.b-w:hover{background:#3b82f6;color:#fff;}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-size:14px;margin-top:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(234,84,85,.35);}
.btnred:disabled{opacity:.6;cursor:default;}
.pill{font-size:9.5px;font-weight:800;border-radius:20px;padding:3px 9px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.p-o{background:rgba(255,159,67,.16);color:#e07b00;}.p-r{background:rgba(234,84,85,.16);color:#ea5455;}
.p-b{background:rgba(59,130,246,.16);color:#3b82f6;}.p-g{background:rgba(40,199,111,.16);color:#1a9e55;}.p-c{background:rgba(0,207,232,.16);color:#00a9c0;}
/* forms + modal */
.lbl{display:block;font-size:11px;color:var(--muted);margin:14px 0 6px;font-weight:600;text-align:left;}
.field{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:var(--ink);font-size:15px;outline:none;transition:.15s;}
.field:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.seg{display:flex;gap:6px;}
.ovl{position:fixed;inset:0;background:rgba(34,41,47,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:22px 20px 28px;box-shadow:0 -8px 40px rgba(34,41,47,.2);}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}.mh .t{font-size:16px;font-weight:800;color:var(--head);}
.updrop{border:1.5px dashed var(--line);border-radius:9px;padding:13px;text-align:center;color:var(--muted);font-size:12.5px;cursor:pointer;background:var(--card);display:flex;align-items:center;justify-content:center;gap:7px;}
.thumb{width:60px;height:60px;border-radius:9px;border:1px solid var(--line);display:inline-flex;flex-direction:column;align-items:center;justify-content:center;background:#fdeaea;color:var(--red);font-size:9px;font-weight:800;background-size:cover;background-position:center;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--head);color:#fff;font-weight:600;font-size:13.5px;padding:12px 20px;border-radius:30px;z-index:80;box-shadow:0 8px 24px rgba(34,41,47,.35);}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;margin:60px auto;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:720px){.hero{padding:16px;}.hgrid{max-width:none;}.top .lockchip span{display:none;}}
@media(min-width:760px){.modal{border-radius:16px;align-self:center;}.ovl{align-items:center;}}
</style>
</head>
<body><div id="root"></div>
<script src="config.js"></script>
<script>
window.SENA_API_URL = window.SENA_API_URL || "SENA_APPS_SCRIPT_URL_BURAYA";
const $=id=>document.getElementById(id);
const S={kod:"",sifre:"",authed:false,data:null,busy:false,loading:false,sel:null,sheet:null,sheetData:null,err:"",filt:"all",kpiPanel:null};
try{S.kod=localStorage.getItem("sena_kod")||"";S.sifre=localStorage.getItem("sena_sifre")||"";}catch(e){}
/* ===== V11 ANINDA AÇILIŞ — son görünüm cihazda saklanır, yenilemede beyaz ekran yerine anında gelir ===== */
function dataKaydet(d){try{localStorage.setItem("sena_cache",JSON.stringify(d));}catch(e){try{localStorage.removeItem("sena_cache");}catch(_){}}}
function dataOku(){try{var s=localStorage.getItem("sena_cache");return s?JSON.parse(s):null;}catch(e){return null;}}
function staleGoster(v){var el=document.getElementById("staleBar");
  if(v){if(!el){el=document.createElement("div");el.id="staleBar";el.style.cssText="position:fixed;top:0;left:0;right:0;z-index:9999;background:#FFF3E0;color:#B26A00;font:600 11px 'Public Sans',system-ui,sans-serif;text-align:center;padding:4px 8px;box-shadow:0 1px 4px rgba(0,0,0,.08);";el.textContent="Kayıtlı görünüm gösteriliyor — güncel veriler arka planda yükleniyor…";document.body.appendChild(el);}}
  else if(el){el.remove();}}
function bekleGoster(){var r=$("root");if(r)r.innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;"><div style="width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#7367f0,#9e95f5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;box-shadow:0 4px 18px rgba(115,103,240,.4);">S</div><div class="spin"></div><div style="color:#6e6b7b;font-size:12px;font-weight:600;">Bağlanıyor…</div></div>';}
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const money=(n,c)=>{n=Number(n)||0;const r=Math.round(Math.abs(n)*100)/100;return (n<0?'-':'')+(c||"₺")+r.toLocaleString("tr-TR",{minimumFractionDigits:(r%1!==0)?2:0,maximumFractionDigits:2});};
const tl=n=>money(n,"₺");
function fotoParse(s){s=String(s==null?"":s);var o={clean:s,urls:[]};var m=s.match(/\[Foto:([^\]]*)\]/i);if(m){o.clean=s.replace(m[0],"").replace(/\s{2,}/g," ").trim();o.urls=(m[1].match(/https?:\/\/[^\s\]]+/g)||[]);}return o;}
function ti(n,extra){return '<i class="ti ti-'+n+'"'+(extra?(' style="'+extra+'"'):'')+' aria-hidden="true"></i>';}
function toast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

/* ---------- hesap motoru ---------- */
const KOMRE=/komisyon|müşavirlik|musavirlik|devir|aktarma|antrepo beyannamesi|antrepo ücreti|antrepo ucreti|vekalet|dosya masraf|özel izin|ozel izin|ekstra|açık masraf|acik masraf/i;
function isKom(m){if(KOMRE.test(m.kalem||""))return true;if((m.kalem||"")==="Diğer"&&/komisyon|devir|aktarma|ekstra/i.test(m.aciklama||""))return true;return false;}
function grpOf(m){if(isKom(m))return "sena";var t=(m.kalem||"")+" "+(m.aciklama||"");if(/vergi|kdv|damga|kkdf|kültür|kultur|yolluk|memur|tse|tareks|laboratuvar/i.test(t))return "vergi";return "loj";}
/* V18: "SENA'nın onaya gönderdiği" tespiti ID ile — masrafEkle newId("SM") üretir.
   Seed/tarihî kayıtlar "SDM…", panel kalemleri ID'siz gelir; kaynak alanı bu ayrımı veremez
   (seed kayıtları da Sena Masraf sayfasında ve Onaylandı yazılı — V17'nin ₺4,37M hatasının sebebi). */
function snKay(m){return String((m&&m.id)||"").lastIndexOf("SM",0)===0;}
function calc(sv){
  var c={};
  c.air=(sv.tasima==="Uçak Kargo");
  c.hd=/hesap\s*d[ıi]ş[ıi]/i.test(sv.not||"");
  c.acik=(sv.durum!=="Çekildi / Kapandı");
  var mas=sv.masraflar||[],ode=sv.odemeler||[];
  c.masTop=mas.reduce((s,m)=>s+(m.tl||0),0);
  /* V18 — YAPISAL AYRIM (ERSA kararı): SM id'li kayıt = SENA'nın onaya gönderdiği; gerisi eski defter.
     · Komisyon = SENA'nın göndermediği (panel + seed/tarihî) isKom kalemleri — "daha önce yazılanlar".
     · "SENA tarafından ödenen" = yalnız SM kayıtları; Onaylandı ise tutara girer,
       Onay Bekliyor ise sayaçta, Red/Düzeltme "Panelden dönenler"de.
     Eski V12 açıklama-bazlı kural kalktı — panel/seed kayıtlarını da yakalayıp karıştırıyordu. */
  c.kom=mas.filter(function(m){return !snKay(m)&&isKom(m);}).reduce((s,m)=>s+(m.tl||0),0);
  c.senaArd=0;c.senaArdBek=0;c.senaArdN=0;c.senaArdBekTL=0;c.senaPayNos={};
  mas.forEach(function(m){
    if(!snKay(m)) return;
    var st1=m.onay||"Onay Bekliyor";
    if(st1==="Onaylandı"){
      c.senaArd+=(m.tl||0);c.senaArdN++;
      if(m.senaNo)c.senaPayNos[String(m.senaNo).replace(/\D/g,"")||m.senaNo]=1;
    }else if(st1==="Onay Bekliyor"){c.senaArdBek++;c.senaArdBekTL+=(m.tl||0);}
  });
  c.odeTop=ode.reduce((s,o)=>s+(o.tutar||0),0);
  c.belgeEksik=ode.some(o=>!String(o.belge||"").trim());
  c.odeBelgesiz=ode.filter(o=>!String(o.belge||"").trim()&&o.onay!=="Onaylandı").reduce((s,o)=>s+(o.tutar||0),0);
  c.bekleyen=mas.filter(m=>m.onay==="Onay Bekliyor");
  var dvs={};mas.forEach(function(m,di){if((m.kalem||"")==="Antrepo Devir Komisyonu")dvs[m.senaNo||("_"+di)]=1;});
  c.devir=Object.keys(dvs).length;
  var nos={};
  function addNos(txt){var r,re=/SENA[.\s-]?(\d{1,4}(?:\/\d{1,4})*)/gi;while((r=re.exec(txt||"")))r[1].split("/").forEach(n=>{if(n)nos[n]=1;});}
  mas.forEach(m=>{if(m.senaNo)nos[String(m.senaNo).replace(/\D/g,"")||m.senaNo]=1;addNos(m.aciklama);});
  ode.forEach(o=>{if(o.senaNo)nos[String(o.senaNo).replace(/\D/g,"")||o.senaNo]=1;});
  addNos(sv.not);
  c.senaNos=Object.keys(nos).filter(Boolean).sort((a,b)=>Number(a)-Number(b));
  var taban=c.air?3320:4670;
  if(/[\/+]/.test(sv.no||""))taban+=1350;
  taban+=c.devir*3670;
  var um=String(sv.not||"").match(/\$\s?([\d.]+)/);
  if(um){var usd=parseFloat(um[1].replace(/\./g,""))||0;if(usd>15000)taban+=Math.round((usd-15000)*0.003*44);}
  c.tarife=Math.round(taban*1.2);
  c.carpan=(c.kom>0&&c.tarife>0)?(c.kom/c.tarife):0;
  c.uyari=[];
  if(c.odeBelgesiz>0)c.uyari.push({w:"warn",ic:"receipt",t:tl(c.odeBelgesiz)+" ödeme için dekont bekleniyor"});
  if(c.bekleyen.length)c.uyari.push({w:"warn",ic:"clock",t:c.bekleyen.length+" masraf onay bekliyor"});
  c.bad=c.uyari.some(u=>u.w==="bad");
  return c;
}
function durChip(sv,c){
  if(c.hd)return '<span class="chip lbl-sec">Hesap dışı</span>';
  if(sv.durum==="Yolda")return '<span class="chip lbl-blue">Yolda</span>';
  if(sv.durum==="Çekildi / Kapandı")return '<span class="chip lbl-ok">Kapandı</span>';
  return '<span class="chip lbl-warn">Gümrükte</span>';
}

function fixData(res){
  try{
    var list=res.sevkiyatlar||[];
    var key=s=>String(s||"").replace(/\s+/g,"").toUpperCase();
    var own={};list.forEach(sv=>{if(sv.kaynak!=="panel"&&sv.no)own[key(sv.no)]=1;});
    res.sevkiyatlar=list.filter(sv=>!(sv.kaynak==="panel"&&own[key(sv.no)]));
  }catch(e){}
  return res;
}
/* ---------- api ---------- */
async function api(action,extra){const body=Object.assign({kod:S.kod,sifre:S.sifre,action:action},extra||{});const r=await fetch(SENA_API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});return await r.json();}
async function login(silent){
  if(!silent){S.kod=$("l_kod").value.trim();S.sifre=$("l_sifre").value.trim();if(!S.kod||!S.sifre){S.err="Kod ve şifre girin.";render();return;}}
  S.busy=true;S.err="";if(!silent)renderLogin();
  try{const res=await api("data");if(res&&res.ok){S.authed=true;S.data=fixData(res);dataKaydet(S.data);S.busy=false;
    if(silent||($("l_rem")&&$("l_rem").checked)){try{localStorage.setItem("sena_kod",S.kod);localStorage.setItem("sena_sifre",S.sifre);}catch(e){}}
    render();}
  else{S.busy=false;S.authed=false;S.err=(res&&res.error)||"Giriş başarısız.";if(silent){S.kod="";S.sifre="";try{localStorage.removeItem("sena_cache");}catch(e){}}renderLogin();}}
  catch(e){S.busy=false;S.err="Bağlantı hatası.";renderLogin();}
}
function logout(){try{localStorage.removeItem("sena_kod");localStorage.removeItem("sena_sifre");localStorage.removeItem("sena_cache");}catch(e){}S.authed=false;S.data=null;S.kod="";S.sifre="";S.sel=null;render();}
async function reload(){S.loading=true;render();try{const r=await api("data");if(r&&r.ok){S.data=fixData(r);dataKaydet(S.data);}}catch(e){}S.loading=false;render();}
async function act(action,extra,ok){if(S.busy)return;S.busy=true;render();try{const res=await api(action,extra);if(res&&res.ok){if(ok)toast(ok);S.busy=false;render();const r=await api("data");if(r&&r.ok){S.data=fixData(r);dataKaydet(S.data);render();}}else{toast((res&&res.error)||"İşlem başarısız");S.busy=false;render();}}catch(e){toast("Bağlantı hatası");S.busy=false;render();}}

function masCalc(){var sd=S.sheetData||{};var pb=sd.pb||"₺";var box=$("m_kurbox");if(box)box.style.display=(pb==="₺")?"none":"block";

  if(pb!=="₺"){var kur=parseFloat(String(($("m_kur")||{}).value||"").replace(",","."))||0;t2=Math.round(t*kur*100)/100;sub=kur>0?(t+" "+pb+" × "+kur):"kur gir";}

function pickBelge(e,stripId){Array.prototype.forEach.call(e.target.files,function(f){if(window.__belge.length>=4)return;var isPdf=/pdf/i.test(f.type)||/\.pdf$/i.test(f.name),isImg=/^image\//.test(f.type);if(!isPdf&&!isImg){toast("Sadece JPG veya PDF");return;}var rd=new FileReader();rd.onload=function(){window.__belge.push(rd.result);var strip=$(stripId);if(!strip)return;var dv=document.createElement("div");dv.className="thumb";if(isPdf){dv.textContent="PDF";}else{dv.style.backgroundImage="url("+rd.result+")";dv.textContent="";}strip.appendChild(dv);};rd.readAsDataURL(f);});e.target.value="";}

  if(a==="masKaydet"){var md=S.sheetData||{};var pb=md.pb||"₺";var tutar=parseFloat(String($("m_tut").value||"").replace(",","."))||0;if(!(tutar>0)){toast("Tutar gerekli");return;}var kur=parseFloat(String(($("m_kur")||{}).value||"").replace(",","."))||0;if(pb!=="₺"&&!(kur>0)){toast("Döviz için kur gir");return;}var mdata={sevkiyatId:md.sevkiyatId,kalem:$("m_kalem").value,tutar:String(tutar),pb:pb,kur:kur,tarih:$("m_tar").value,aciklama:$("m_ack").value.trim(),senaNo:$("m_sena").value.trim(),belgeler:(window.__belge||[]).slice()};S.sheet=null;S.sheetData=null;window.__belge=[];act("masrafEkle",{data:mdata},"Masraf onaya gönderildi ✓");return;}
